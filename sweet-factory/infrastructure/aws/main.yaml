AWSTemplateFormatVersion: '2010-09-09'
Description: |
  Sweet Factory Cloud ERP Platform — AWS Infrastructure
  BTEC Unit 6: Networking in the Cloud
  
  Architecture:
  - VPC with public/private subnets across 2 AZs
  - Application Load Balancer in public subnets
  - ECS Fargate in private subnets (Auto Scaling)
  - RDS PostgreSQL in isolated private subnets
  - NAT Gateway for outbound internet from private subnets
  - Route53 DNS + ACM SSL certificate
  - VPN Gateway for office connectivity

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues: [development, staging, production]
    Description: Deployment environment

  DBPassword:
    Type: String
    NoEcho: true
    MinLength: 12
    Description: RDS PostgreSQL master password

  JWTSecretKey:
    Type: String
    NoEcho: true
    MinLength: 32
    Description: JWT signing secret key

  DomainName:
    Type: String
    Default: sweetfactory.com
    Description: Route53 hosted zone domain name

  CertificateArn:
    Type: String
    Description: ACM Certificate ARN for HTTPS

Mappings:
  EnvConfig:
    production:
      MinCapacity: 2
      MaxCapacity: 10
      DBInstanceClass: db.t3.medium
      AppCPU: 1024
      AppMemory: 2048
    staging:
      MinCapacity: 1
      MaxCapacity: 3
      DBInstanceClass: db.t3.micro
      AppCPU: 512
      AppMemory: 1024
    development:
      MinCapacity: 1
      MaxCapacity: 2
      DBInstanceClass: db.t3.micro
      AppCPU: 256
      AppMemory: 512

Resources:

  # ===========================================================================
  # VPC — Virtual Private Cloud
  # ===========================================================================
  SweetFactoryVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub sweet-factory-vpc-${Environment}
        - Key: Project
          Value: SweetFactory
        - Key: Environment
          Value: !Ref Environment

  # ===========================================================================
  # Internet Gateway
  # ===========================================================================
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub sweet-factory-igw-${Environment}

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref SweetFactoryVPC
      InternetGatewayId: !Ref InternetGateway

  # ===========================================================================
  # Public Subnets (2 AZs — for ALB and NAT Gateway)
  # ===========================================================================
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref SweetFactoryVPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub sweet-factory-public-1a-${Environment}
        - Key: Type
          Value: Public

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref SweetFactoryVPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub sweet-factory-public-1b-${Environment}
        - Key: Type
          Value: Public

  # ===========================================================================
  # Private Subnets — App layer (2 AZs)
  # ===========================================================================
  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref SweetFactoryVPC
      CidrBlock: 10.0.3.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub sweet-factory-private-app-1a-${Environment}
        - Key: Type
          Value: Private-App

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref SweetFactoryVPC
      CidrBlock: 10.0.4.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub sweet-factory-private-app-1b-${Environment}
        - Key: Type
          Value: Private-App

  # ===========================================================================
  # Private Subnets — Database layer (isolated — 2 AZs)
  # ===========================================================================
  DBSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref SweetFactoryVPC
      CidrBlock: 10.0.5.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub sweet-factory-private-db-1a-${Environment}
        - Key: Type
          Value: Private-DB

  DBSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref SweetFactoryVPC
      CidrBlock: 10.0.6.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub sweet-factory-private-db-1b-${Environment}
        - Key: Type
          Value: Private-DB

  # ===========================================================================
  # NAT Gateway (enables private subnets to reach internet for updates)
  # ===========================================================================
  NatGatewayEIP:
    Type: AWS::EC2::EIP
    DependsOn: VPCGatewayAttachment
    Properties:
      Domain: vpc

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatGatewayEIP.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub sweet-factory-nat-${Environment}

  # ===========================================================================
  # Route Tables
  # ===========================================================================
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref SweetFactoryVPC
      Tags:
        - Key: Name
          Value: !Sub sweet-factory-rt-public-${Environment}

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref SweetFactoryVPC
      Tags:
        - Key: Name
          Value: !Sub sweet-factory-rt-private-${Environment}

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnet1RouteTableAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2RouteTableAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  # ===========================================================================
  # Security Groups
  # ===========================================================================
  
  # ALB Security Group — allows HTTPS from internet
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub sweet-factory-sg-alb-${Environment}
      GroupDescription: Allow HTTPS traffic to Application Load Balancer
      VpcId: !Ref SweetFactoryVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS from internet
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP (redirected to HTTPS)
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          DestinationSecurityGroupId: !Ref AppSecurityGroup
          Description: Forward to app servers
      Tags:
        - Key: Name
          Value: !Sub sweet-factory-sg-alb-${Environment}

  # App Security Group — only accepts from ALB
  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub sweet-factory-sg-app-${Environment}
      GroupDescription: Allow traffic only from ALB
      VpcId: !Ref SweetFactoryVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: FastAPI from ALB only
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          DestinationSecurityGroupId: !Ref DBSecurityGroup
          Description: PostgreSQL
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS outbound (via NAT)
      Tags:
        - Key: Name
          Value: !Sub sweet-factory-sg-app-${Environment}

  # DB Security Group — only accepts from App
  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub sweet-factory-sg-db-${Environment}
      GroupDescription: Allow PostgreSQL only from app servers
      VpcId: !Ref SweetFactoryVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref AppSecurityGroup
          Description: PostgreSQL from app servers only
      Tags:
        - Key: Name
          Value: !Sub sweet-factory-sg-db-${Environment}

  # ===========================================================================
  # RDS PostgreSQL (Multi-AZ for production)
  # ===========================================================================
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Private subnets for RDS
      SubnetIds:
        - !Ref DBSubnet1
        - !Ref DBSubnet2
      Tags:
        - Key: Name
          Value: !Sub sweet-factory-db-subnet-group-${Environment}

  RDSInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    Properties:
      DBInstanceIdentifier: !Sub sweet-factory-db-${Environment}
      DBName: sweet_factory_db
      DBInstanceClass: !FindInMap [EnvConfig, !Ref Environment, DBInstanceClass]
      Engine: postgres
      EngineVersion: '16.1'
      MasterUsername: sweet_factory_admin
      MasterUserPassword: !Ref DBPassword
      AllocatedStorage: 50
      MaxAllocatedStorage: 500
      StorageType: gp3
      StorageEncrypted: true
      MultiAZ: !If [IsProd, true, false]
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref DBSecurityGroup
      BackupRetentionPeriod: 7
      DeletionProtection: !If [IsProd, true, false]
      EnableCloudwatchLogsExports:
        - postgresql
      Tags:
        - Key: Name
          Value: !Sub sweet-factory-rds-${Environment}

  # ===========================================================================
  # Application Load Balancer
  # ===========================================================================
  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub sweet-factory-alb-${Environment}
      Type: application
      Scheme: internet-facing
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      Tags:
        - Key: Name
          Value: !Sub sweet-factory-alb-${Environment}

  ALBTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub sweet-factory-tg-${Environment}
      Port: 8000
      Protocol: HTTP
      VpcId: !Ref SweetFactoryVPC
      TargetType: ip
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: '200'
      Tags:
        - Key: Name
          Value: !Sub sweet-factory-tg-${Environment}

  ALBHTTPSListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref CertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ALBTargetGroup
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06

  ALBHTTPListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: '443'
            StatusCode: HTTP_301

  # ===========================================================================
  # ECS Fargate Cluster
  # ===========================================================================
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub sweet-factory-cluster-${Environment}
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
      Tags:
        - Key: Name
          Value: !Sub sweet-factory-cluster-${Environment}

  # ===========================================================================
  # Auto Scaling — scales on CPU > 70%
  # ===========================================================================
  AutoScalingTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MaxCapacity: !FindInMap [EnvConfig, !Ref Environment, MaxCapacity]
      MinCapacity: !FindInMap [EnvConfig, !Ref Environment, MinCapacity]
      ResourceId: !Sub service/${ECSCluster}/sweet-factory-service-${Environment}
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs

  ScaleOutPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub sweet-factory-scale-out-${Environment}
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref AutoScalingTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 70.0     # Scale out when CPU > 70%
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        ScaleInCooldown: 300  # 5 minutes before scaling in
        ScaleOutCooldown: 120 # 2 minutes before scaling out

  # ===========================================================================
  # Route53 DNS
  # ===========================================================================
  DNSRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneName: !Sub ${DomainName}.
      Name: !Sub api.${DomainName}
      Type: A
      AliasTarget:
        DNSName: !GetAtt ApplicationLoadBalancer.DNSName
        HostedZoneId: !GetAtt ApplicationLoadBalancer.CanonicalHostedZoneID

  # ===========================================================================
  # VPN Gateway (Site-to-Site VPN — office to cloud)
  # ===========================================================================
  VPNGateway:
    Type: AWS::EC2::VPNGateway
    Properties:
      Type: ipsec.1
      Tags:
        - Key: Name
          Value: !Sub sweet-factory-vpn-${Environment}

  VPNGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref SweetFactoryVPC
      VpnGatewayId: !Ref VPNGateway

Conditions:
  IsProd: !Equals [!Ref Environment, production]

Outputs:
  VpcId:
    Description: VPC ID
    Value: !Ref SweetFactoryVPC
    Export:
      Name: !Sub sweet-factory-vpc-${Environment}

  ALBDNSName:
    Description: Application Load Balancer DNS
    Value: !GetAtt ApplicationLoadBalancer.DNSName

  RDSEndpoint:
    Description: RDS PostgreSQL endpoint
    Value: !GetAtt RDSInstance.Endpoint.Address

  ECSClusterName:
    Description: ECS Cluster Name
    Value: !Ref ECSCluster

  PublicSubnet1:
    Value: !Ref PublicSubnet1
    Export:
      Name: !Sub sweet-factory-public-subnet-1-${Environment}

  PublicSubnet2:
    Value: !Ref PublicSubnet2
    Export:
      Name: !Sub sweet-factory-public-subnet-2-${Environment}

  PrivateSubnet1:
    Value: !Ref PrivateSubnet1
    Export:
      Name: !Sub sweet-factory-private-subnet-1-${Environment}

  PrivateSubnet2:
    Value: !Ref PrivateSubnet2
    Export:
      Name: !Sub sweet-factory-private-subnet-2-${Environment}
