# =============================================================================
# Sweet Factory ERP — GitHub Actions CI/CD Pipeline
# BTEC Unit 6: Demonstrates automated deployment to AWS
# Pipeline stages: Test → Build → Docker → Deploy
# =============================================================================

name: 🍬 Sweet Factory CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: sweet-factory-api
  ECS_SERVICE: sweet-factory-service
  ECS_CLUSTER: sweet-factory-cluster
  CONTAINER_NAME: sweet-factory-api

jobs:
  # ─── Stage 1: Code Quality & Testing ────────────────────────────────────────
  test:
    name: 🧪 Test & Lint
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sweet_factory_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: 📦 Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔍 Lint with Ruff
        working-directory: backend
        run: |
          pip install ruff
          ruff check . --output-format=github
        continue-on-error: false

      - name: 🎨 Check formatting with Black
        working-directory: backend
        run: |
          pip install black
          black --check .
        continue-on-error: true  # Warning only

      - name: 🔒 Security scan with Bandit
        working-directory: backend
        run: |
          pip install bandit
          bandit -r app/ -x tests/ -ll
        continue-on-error: true

      - name: 🧪 Run unit tests with coverage
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/sweet_factory_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-minimum-32-characters-long
          JWT_SECRET_KEY: test-jwt-secret-key
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_NAME: sweet_factory_test
          DATABASE_USER: test_user
          DATABASE_PASSWORD: test_password
          APP_ENV: testing
        run: |
          pytest tests/unit/ -v \
            --cov=app \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under=70 \
            -x

      - name: 🔗 Run integration tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/sweet_factory_test
          SECRET_KEY: test-secret-key-minimum-32-characters-long
          JWT_SECRET_KEY: test-jwt-secret-key
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_NAME: sweet_factory_test
          DATABASE_USER: test_user
          DATABASE_PASSWORD: test_password
          APP_ENV: testing
        run: |
          pytest tests/integration/ -v -x --timeout=60
        continue-on-error: true

      - name: 📊 Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend
        continue-on-error: true

  # ─── Stage 2: Build Docker Image ────────────────────────────────────────────
  build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🔐 Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: 🏷️ Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=git-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🔨 Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          dockerfile: ./backend/Dockerfile
          target: production
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}

      - name: 🔍 Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          format: 'table'
          exit-code: '0'  # Don't fail on vulnerabilities (warn only)
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

  # ─── Stage 3: Deploy to Staging ──────────────────────────────────────────────
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment: staging

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🔐 Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: 📝 Update ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: infrastructure/aws/ecs-task-definition-staging.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:git-${{ github.sha }}

      - name: 🚀 Deploy to ECS Staging
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}-staging
          cluster: ${{ env.ECS_CLUSTER }}-staging
          wait-for-service-stability: true
          wait-for-minutes: 10

      - name: 🏥 Health check staging
        run: |
          sleep 30
          response=$(curl -s -o /dev/null -w "%{http_code}" https://staging.sweetfactory.com/health)
          if [ "$response" != "200" ]; then
            echo "❌ Health check failed with status: $response"
            exit 1
          fi
          echo "✅ Staging deployment healthy"

  # ─── Stage 4: Deploy to Production ──────────────────────────────────────────
  deploy-production:
    name: 🏭 Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, deploy-staging]
    if: github.ref == 'refs/heads/main'
    environment: production   # Requires manual approval in GitHub

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🔐 Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: 🗄️ Run database migrations
        run: |
          aws ecs run-task \
            --cluster ${{ env.ECS_CLUSTER }} \
            --task-definition sweet-factory-migrations \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.PRIVATE_SUBNET_1 }}],securityGroups=[${{ secrets.SG_APP }}],assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"migrator","command":["alembic","upgrade","head"]}]}'

      - name: 📝 Update ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: infrastructure/aws/ecs-task-definition-production.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:git-${{ github.sha }}

      - name: 🚀 Deploy to ECS Production (Blue/Green)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 15
          codedeploy-appspec: infrastructure/aws/appspec.yaml
          codedeploy-application: sweet-factory-app
          codedeploy-deployment-group: sweet-factory-prod-dg

      - name: 🏥 Production health check
        run: |
          sleep 60
          for i in {1..5}; do
            response=$(curl -s -o /dev/null -w "%{http_code}" https://sweetfactory.com/health)
            if [ "$response" == "200" ]; then
              echo "✅ Production deployment healthy (attempt $i)"
              exit 0
            fi
            echo "⏳ Waiting... attempt $i, status: $response"
            sleep 30
          done
          echo "❌ Production health check failed"
          exit 1

      - name: 📢 Notify deployment success
        if: success()
        run: |
          echo "🎉 Production deployment successful!"
          echo "Version: git-${{ github.sha }}"
          echo "Deployed by: ${{ github.actor }}"
