version: '3.9'

# =============================================================================
# Sweet Factory Cloud ERP — Docker Compose
# Local development environment mirroring AWS cloud architecture
# =============================================================================

networks:
  sweet_factory_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24   # Simulates VPC private subnet

volumes:
  postgres_data:
  redis_data:
  nginx_logs:

services:

  # ─── PostgreSQL Database ─────────────────────────────────────────────────
  # Mirrors: AWS RDS PostgreSQL in Private Subnet
  db:
    image: postgres:16-alpine
    container_name: sweet_factory_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-sweet_factory_db}
      POSTGRES_USER: ${DATABASE_USER:-sweet_factory_user}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-StrongPass@2024!}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      sweet_factory_network:
        ipv4_address: 172.20.0.10
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-sweet_factory_user} -d ${DATABASE_NAME:-sweet_factory_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Redis Cache ─────────────────────────────────────────────────────────
  # Mirrors: AWS ElastiCache Redis
  redis:
    image: redis:7-alpine
    container_name: sweet_factory_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-RedisPass@2024!} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      sweet_factory_network:
        ipv4_address: 172.20.0.11
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-RedisPass@2024!}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FastAPI Application ─────────────────────────────────────────────────
  # Mirrors: AWS ECS Fargate Tasks in Auto Scaling Group
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: sweet_factory_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      APP_ENV: development
      DEBUG: "true"
    volumes:
      - ./backend:/app:ro   # Read-only in production, rw for dev hot-reload
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      sweet_factory_network:
        ipv4_address: 172.20.0.20
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Scale: docker-compose up --scale api=3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ─── API (Development hot-reload) ────────────────────────────────────────
  api-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    container_name: sweet_factory_api_dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      REDIS_HOST: redis
      APP_ENV: development
      DEBUG: "true"
    volumes:
      - ./backend:/app   # Full mount for hot-reload
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      sweet_factory_network:
        ipv4_address: 172.20.0.21
    profiles:
      - dev

  # ─── NGINX Reverse Proxy ─────────────────────────────────────────────────
  # Mirrors: AWS Application Load Balancer
  nginx:
    image: nginx:1.25-alpine
    container_name: sweet_factory_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
    networks:
      sweet_factory_network:
        ipv4_address: 172.20.0.30
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── pgAdmin ─────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sweet_factory_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@sweetfactory.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-PgAdmin@2024!}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      sweet_factory_network:
        ipv4_address: 172.20.0.40
    profiles:
      - tools
