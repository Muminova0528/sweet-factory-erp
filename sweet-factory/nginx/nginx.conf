# =============================================================================
# Sweet Factory ERP — NGINX Configuration
# Reverse proxy + load balancing (mirrors AWS ALB behavior locally)
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─── Logging ─────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # ─── Performance ─────────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    # ─── Gzip Compression ────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/xml+rss
               application/atom+xml image/svg+xml;

    # ─── Security Headers ────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Hide NGINX version
    server_tokens off;

    # ─── Rate Limiting ───────────────────────────────────────────────────────
    # Mirrors AWS WAF rate limiting rules
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ─── Upstream (API servers — mirrors ALB target group) ───────────────────
    upstream sweet_factory_api {
        least_conn;                         # Load balance: least connections algorithm
        server api:8000 weight=1 max_fails=3 fail_timeout=30s;
        # Add more servers for horizontal scaling:
        # server api2:8000 weight=1 max_fails=3 fail_timeout=30s;
        # server api3:8000 weight=1 max_fails=3 fail_timeout=30s;

        keepalive 32;                       # Keep connections alive to upstream
    }

    # ─── Proxy Cache ─────────────────────────────────────────────────────────
    proxy_cache_path /tmp/nginx_cache levels=1:2
                     keys_zone=api_cache:10m
                     max_size=100m
                     inactive=60m
                     use_temp_path=off;

    # ─── HTTP → HTTPS Redirect ────────────────────────────────────────────────
    server {
        listen 80;
        server_name sweetfactory.com www.sweetfactory.com localhost;

        # Health check endpoint (no redirect — used by load balancer)
        location /health {
            proxy_pass http://sweet_factory_api;
            proxy_http_version 1.1;
            access_log off;
        }

        # Redirect all other HTTP to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── HTTPS Main Server ────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name sweetfactory.com www.sweetfactory.com localhost;

        # SSL Certificate (in production: AWS ACM certificate via ALB)
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ─── Frontend (Static Files) ─────────────────────────────────────────
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
            expires 1h;
            add_header Cache-Control "public, no-transform";
        }

        # Static assets — long cache
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # ─── API Proxy ───────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;
            limit_conn conn_limit 20;

            proxy_pass http://sweet_factory_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID      $request_id;

            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;

            # Cache GET requests for dashboard (60 seconds)
            proxy_cache api_cache;
            proxy_cache_methods GET;
            proxy_cache_valid 200 60s;
            proxy_cache_key "$scheme$request_method$host$request_uri$http_authorization";
            proxy_cache_bypass $http_cache_control;
            add_header X-Cache-Status $upstream_cache_status;
        }

        # Auth endpoints — stricter rate limiting
        location /api/v1/auth/login {
            limit_req zone=auth_limit burst=5 nodelay;

            proxy_pass http://sweet_factory_api;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API Documentation
        location /docs {
            proxy_pass http://sweet_factory_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://sweet_factory_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # Health check (no rate limiting)
        location /health {
            proxy_pass http://sweet_factory_api;
            proxy_http_version 1.1;
            access_log off;
        }
    }
}
